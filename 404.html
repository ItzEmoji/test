<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 Not Found</title>

  <style>
    :root {
      color-scheme: dark;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;

      background: #0a0a0a;
      color: #f5f5f5;

      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco,
        Consolas, "Liberation Mono", monospace;
    }

    .box {
      text-align: center;
      padding: 2rem;
      max-width: 600px;
    }

    h1 {
      font-size: clamp(4rem, 10vw, 8rem);
      margin: 0;
      line-height: 1;
    }

    p {
      margin-top: 1rem;
      opacity: 0.75;
      font-size: 1rem;
    }

    code {
      display: inline-block;
      margin-top: 1.5rem;
      padding: 0.6rem 1rem;

      background: #111;
      border: 1px solid #222;
      border-radius: 10px;

      color: #8be9fd;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>404</h1>

    <p>
      The requested file does not exist.
    </p>

    <code>
      HTTP 404 — Not Found
    </code>
  </div>
</body>
</html>
